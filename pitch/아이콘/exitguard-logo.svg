<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100" role="img" aria-label="ExitGuard">
  <title>ExitGuard</title>
  <!-- 3 rails converging into the gate: 노무 / 영업비밀 / 보안 (semantic 3-color) -->
  <rect x="6" y="8"  width="36" height="14" fill="#0FB2C4"/>
  <rect x="6" y="43" width="36" height="14" fill="#8B5CF6"/>
  <rect x="6" y="78" width="36" height="14" fill="#F59E0B"/>
  <!-- Angular geometric G (ink). Uniform 14 stroke, squared terminals, jaw aligned to middle rail -->
  <g fill="#3C4E72">
    <rect x="44" y="8"  width="14" height="84"/>
    <rect x="44" y="8"  width="68" height="14"/>
    <rect x="44" y="78" width="68" height="14"/>
    <rect x="98" y="22" width="14" height="12"/>
    <rect x="98" y="43" width="14" height="49"/>
    <rect x="70" y="43" width="42" height="14"/>
  </g>
</svg>
